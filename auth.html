
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podium.hs | Acceso</title>
    <meta name="theme-color" content="#ffffff" />
    <style>
      :root {
        --paper: #ffffff;
        --ink: #0b0b0b;
        --muted: #505050;
        --soft: #f3f4f6;
        --line: rgba(0, 0, 0, 0.18);
        --lineStrong: rgba(0, 0, 0, 0.85);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: linear-gradient(180deg, #f7f7f7, #ffffff);
        color: var(--ink);
      }
      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 26px 18px 56px;
      }
      .sheet {
        background: var(--paper);
        border-radius: 22px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.06);
      }
      .top {
        padding: 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .badge {
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 3px solid var(--ink);
        overflow: hidden;
        background: #fff;
      }
      .badge img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .brandTitle { display: flex; flex-direction: column; line-height: 1.05; }
      .brandTitle strong { font-size: 16px; letter-spacing: -0.01em; }
      .brandTitle span { font-size: 12px; color: var(--muted); }

      .body { padding: 18px; display: grid; gap: 14px; }
      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
        background: #fff;
      }
      .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
      .label { font-size: 12px; color: var(--muted); font-weight: 900; }
      .input {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 14px;
        font-size: 16px;
        outline: none;
        background: #fff;
      }
      .btn {
        border: 1px solid var(--lineStrong);
        background: var(--ink);
        color: #fff;
        border-radius: 14px;
        padding: 14px 16px;
        font-weight: 900;
        cursor: pointer;
        font-size: 16px;
      }
      .btn.secondary { background: #fff; color: var(--ink); border-color: var(--line); }
      .hint { font-size: 12px; color: var(--muted); line-height: 1.35; }
      .error { font-size: 12px; color: #b91c1c; font-weight: 900; }
      .links { display: flex; gap: 10px; flex-wrap: wrap; }
      a.link {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 10px 12px;
        color: var(--ink);
        font-weight: 900;
        background: #fff;
      }
      @media (max-width: 640px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <main class="sheet">
        <header class="top">
          <div class="brand">
            <div class="badge"><img src="./logopodium.png" alt="Podium" /></div>
            <div class="brandTitle">
              <strong>Podium.hs</strong>
              <span>Acceso POS</span>
            </div>
          </div>
          <button class="btn secondary" id="logout" type="button" style="display:none;">Salir</button>
        </header>

        <section class="body">
          <div class="card">
            <div class="row">
              <div>
                <div class="label">Correo</div>
                <input class="input" id="email" placeholder="caja@podium.com" autocomplete="username" />
              </div>
              <button class="btn" id="login" type="button">Entrar</button>
            </div>

            <div style="margin-top:10px;">
              <div class="label">Contraseña</div>
              <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
            </div>

            <div class="hint" style="margin-top:10px;">
              Roles demo:
              caja@podium.com (Caja)
              admin@podium.com (Admin)
              inventario@podium.com (Compras)
              supervisor@podium.com (Supervisor)
            </div>
            <div class="error" id="err" style="display:none; margin-top:10px;"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./auth.js"></script>
    <script>
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const btn = document.getElementById('login');
      const err = document.getElementById('err');
      const logout = document.getElementById('logout');

      function go(role) {
        if (role === 'caja') window.location.href = './demo.html';
        else if (role === 'admin') window.location.href = './admin.html';
        else if (role === 'inventario') window.location.href = './admin.html';
        else if (role === 'supervisor') window.location.href = './demo.html';
        else {
          err.style.display = 'block';
          err.textContent = 'Usuario no permitido.';
        }
      }

      async function handleLogin() {
        err.style.display = 'none';
        const s = await login(email.value, password.value);
        if (!s) {
          err.style.display = 'block';
          err.textContent = 'Credenciales incorrectas.';
          return;
        }
        go(s.role);
      }

      btn.addEventListener('click', handleLogin);
      email.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      password.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
      });

      const s = getSession();
      if (s && s.role !== 'unknown') {
        logout.style.display = 'inline-flex';
      }
      logout.addEventListener('click', () => {
        clearSession();
        window.location.href = './index.html';
      });
    </script>
  </body>
</html>
